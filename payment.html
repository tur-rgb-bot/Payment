<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment QRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:900px;
    max-width:100%;
    border-radius:20px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.product{
    padding:30px;
    background:#f8f9fa;
}

.product img{
    width:100%;
    border-radius:15px;
}

.product h2{
    margin-top:20px;
}

.price{
    font-size:24px;
    color:#2a5298;
    margin-top:10px;
    font-weight:600;
}

.payment{
    padding:30px;
}

.qris{
    text-align:center;
}

.qris img{
    width:220px;
    margin-top:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#2a5298;
    color:white;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e3c72;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.success{
    margin-top:15px;
    padding:10px;
    background:#d4edda;
    color:#155724;
    border-radius:10px;
    display:none;
}

@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Produk -->
    <div class="product">
        <img src="https://files.catbox.moe/3ubhs7.jpg" alt="Produk">
        <h2>Produk jb</h2>
        <p>Produk Jual Beli Akun All Game.</p>      
    </div>
    
    <div class="product">
        <img src="https://files.catbox.moe/qt7xg2.jpg" alt="Produk">
        <h2>Produk Hoasting</h2>
        <p>Mulai Dari Panel Pterodactil Dan Apk Bugs Dan Function Bugs Dll.</p>      
    </div>

    <!-- Payment -->
    <div class="payment">
        <h2>Pembayaran QRIS</h2>
        <p>Silakan scan QRIS di bawah ini untuk melakukan pembayaran.</p>

        <div class="qris">
            <!-- GANTI DENGAN GAMBAR QRIS KAMU -->
            <img src="https://files.catbox.moe/tg5zol.jpg" alt="QRIS">
        </div>

        <hr style="margin:20px 0;">

        <h3>Upload Bukti Transfer</h3>
        <input type="file" id="bukti" accept="image/*">
        <button onclick="konfirmasi()">Konfirmasi Pembayaran</button>

        <div class="success" id="successMsg">
            ✅ Bukti pembayaran berhasil dikonfirmasi!
        </div>
    </div>

</div>

<script>
function konfirmasi(){
    const file = document.getElementById("bukti").files[0];

    if(!file){
        alert("Upload bukti pembayaran dulu!");
        return;
    }

    document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
